# DFlash config for Meta-Llama-3.1-8B-Instruct
# ─────────────────────────────────────────────

target_model_name_or_path: "meta-llama/Meta-Llama-3.1-8B-Instruct"

num_draft_layers:          3
block_size:                16
num_target_sample_layers:  8

blocks_per_sequence:       4
loss_decay_gamma:          7.0

train_data_path: "./cache/dataset/llama3_regen.jsonl"
max_seq_len:     4096
num_workers:     4

learning_rate:                  6e-4
min_lr:                         6e-5
weight_decay:                   0.1
warmup_ratio:                   0.04
num_epochs:                     6
per_device_train_batch_size:    2
gradient_accumulation_steps:    4
max_grad_norm:                  1.0

output_dir:    "./checkpoints/llama3-8b-dflash-b16"
save_steps:    500
logging_steps: 50

mixed_precision: "bf16"
seed: 42
